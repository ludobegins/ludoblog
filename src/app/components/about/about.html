<section id="about">
  <main class="about-wrap">
    <div class="about-img">
      <img src="about.jpg" alt="about image" />
    </div>
    <div class="about-content">
      <h2 class="about-heading">{{heading}}</h2>
      <div class="about-body" [innerHTML]="bodyHtml"></div>
      <div class="about-cta">
        <a mat-button class="cta-link" href="https://www.linkedin.com/in/ludovic-beghin" target="_blank" rel="noopener noreferrer" aria-label="Let's talk on LinkedIn">Let's talk</a>
      </div>
    </div>
  </main>
</section>
